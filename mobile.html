<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>SESSİZLİK MOBİL</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            position: fixed;
            inset: 0;
        }

        /* === PERFORMANS MODLARI === */
        .quality-low .face { box-shadow: none !important; }
        .quality-low .window::after { display: none; }
        .quality-low #noise-overlay { display: none; }
        .quality-low .furniture { display: none; }
        .quality-low .blood { display: none; }
        .quality-low #monster { filter: none !important; }

        .quality-medium .window::after { display: none; }
        .quality-medium #noise-overlay { opacity: 0.01; }
        .quality-medium .furniture { display: none; }

        /* === 3D MOTOR - MOBİL OPTİMİZE === */
        #world {
            position: fixed;
            inset: 0;
            perspective: 600px; /* Düşük FOV = daha az render */
            overflow: hidden;
            transform: translateZ(0); /* GPU layer */
        }

        #camera {
            position: absolute;
            width: 0;
            height: 0;
            left: 50%;
            top: 50%;
            transform-style: preserve-3d;
            will-change: transform;
        }

        /* === SADELEŞTİRİLMİŞ ODA === */
        .room {
            position: absolute;
            width: 1200px; /* Daha küçük oda */
            height: 600px;
            left: -600px;
            top: -300px;
            transform-style: preserve-3d;
        }

        .face {
            position: absolute;
            backface-visibility: hidden;
        }

        .floor {
            width: 1200px;
            height: 1200px;
            background: #1a1a1a;
            transform: rotateX(90deg) translateZ(-300px);
            transform-origin: center;
        }

        .ceiling {
            width: 1200px;
            height: 1200px;
            background: #0a0a0a;
            transform: rotateX(-90deg) translateZ(-300px);
            transform-origin: center;
        }

        .wall-front {
            width: 1200px;
            height: 600px;
            background: linear-gradient(180deg, #0a0a0a 0%, #151515 50%, #0a0a0a 100%);
            transform: translateZ(-600px);
        }

        .wall-back {
            width: 1200px;
            height: 600px;
            background: #050505;
            transform: rotateY(180deg) translateZ(-600px);
        }

        .wall-left {
            width: 1200px;
            height: 600px;
            left: -600px;
            background: linear-gradient(90deg, #000 0%, #151515 50%, #000 100%);
            transform: rotateY(90deg) translateZ(-600px);
        }

        .wall-right {
            width: 1200px;
            height: 600px;
            right: -600px;
            background: linear-gradient(-90deg, #000 0%, #151515 50%, #000 100%);
            transform: rotateY(-90deg) translateZ(-600px);
        }

        /* === DETAYLAR (MOBİL) === */
        .window {
            position: absolute;
            width: 200px;
            height: 250px;
            left: 50%;
            top: 80px;
            transform: translateX(-50%) translateZ(-595px);
            background: #000510;
            border: 5px solid #1a1a1a;
        }

        .door {
            position: absolute;
            width: 120px;
            height: 240px;
            background: #000;
            border: 2px solid #1a1a1a;
        }

        .door-left { left: 200px; top: 200px; transform: translateZ(-595px); }
        .door-right { right: 200px; top: 200px; transform: translateZ(-595px); }

        .furniture-simple {
            position: absolute;
            background: #2a1a1a;
        }

        .table-simple {
            width: 120px;
            height: 180px;
            left: -250px;
            top: 150px;
            transform: translateZ(-400px) rotateX(90deg);
        }

        .chair-simple {
            width: 60px;
            height: 60px;
            right: -200px;
            top: 300px;
            transform: translateZ(-300px) rotateX(90deg);
            background: #3a2a2a;
        }

        /* === YARATIK (MOBİL) === */
        #monster {
            position: absolute;
            width: 100px;
            height: 250px;
            left: 50%;
            top: 50%;
            margin-left: -50px;
            margin-top: -125px;
            transform-style: preserve-3d;
            opacity: 0;
            will-change: transform, opacity;
        }

        .monster-mesh {
            width: 100%;
            height: 100%;
            background: #000;
            clip-path: polygon(25% 0%, 75% 0%, 100% 100%, 0% 100%);
        }

        .monster-eyes {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            display: flex;
            justify-content: space-between;
        }

        .eye {
            width: 20px;
            height: 6px;
            background: #ff0000;
            border-radius: 50%;
            box-shadow: 0 0 15px #ff0000;
        }

        #monster.far { transform: translateZ(-1000px) scale(0.3); opacity: 0.2; }
        #monster.medium { transform: translateZ(-500px) scale(0.7); opacity: 0.6; }
        #monster.close { transform: translateZ(-250px) scale(1); opacity: 0.9; }
        #monster.attacking { transform: translateZ(-50px) scale(1.5); opacity: 1; }

        /* === EL FENERİ (MOBİL) === */
        #flashlight {
            position: fixed;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            background: radial-gradient(circle at 30% 30%,
                rgba(255, 255, 240, 0.9) 0%,
                rgba(255, 255, 200, 0.5) 20%,
                rgba(255, 240, 150, 0.2) 40%,
                transparent 60%);
            transform: translate(-50%, -50%);
            filter: blur(4px);
        }

        #darkness-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at var(--touch-x, 50%) var(--touch-y, 50%),
                transparent 0%,
                transparent 80px,
                rgba(0, 0, 0, 0.6) 150px,
                rgba(0, 0, 0, 0.95) 300px);
            pointer-events: none;
            z-index: 999;
        }

        /* === MOBİL KONTROLLER === */
        #joystick-zone {
            position: fixed;
            left: 20px;
            bottom: 100px;
            width: 150px;
            height: 150px;
            z-index: 3000;
        }

        #joystick {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            left: 45px;
            top: 45px;
            transition: transform 0.1s;
        }

        #joystick.active {
            background: rgba(255,255,255,0.3);
        }

        #look-zone {
            position: fixed;
            right: 0;
            bottom: 0;
            width: 60%;
            height: 60%;
            z-index: 2500;
        }

        /* === UI (MOBİL) === */
        #ui {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 2000;
        }

        #hud-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        #heart-monitor {
            font-size: 16px;
            color: #ff3333;
            text-shadow: 0 0 5px #ff0000;
        }

        #heart-monitor.danger {
            animation: heartbeat 0.6s infinite;
            font-size: 20px;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        #sound-display {
            text-align: right;
        }

        #sound-bar {
            width: 150px;
            height: 10px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #333;
            margin-top: 5px;
            overflow: hidden;
        }

        #sound-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0f0, #ff0, #f00);
            transition: width 0.1s;
        }

        #sound-text {
            font-size: 10px;
            color: #666;
            letter-spacing: 1px;
        }

        /* === AYARLAR MENÜSÜ === */
        #settings-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            color: #fff;
            font-size: 20px;
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        #settings-panel {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 6000;
            display: none;
            flex-direction: column;
            padding: 40px 20px;
            pointer-events: auto;
        }

        #settings-panel.active { display: flex; }

        .setting-item {
            margin-bottom: 30px;
        }

        .setting-label {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .setting-options {
            display: flex;
            gap: 10px;
        }

        .option-btn {
            flex: 1;
            padding: 15px;
            background: transparent;
            border: 1px solid #333;
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
        }

        .option-btn.active {
            border-color: #fff;
            color: #fff;
            background: rgba(255,255,255,0.1);
        }

        .slider-container {
            margin-top: 10px;
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            background: #333;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
        }

        #close-settings {
            margin-top: auto;
            padding: 20px;
            background: #fff;
            color: #000;
            border: none;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* === START SCREEN (MOBİL) === */
        #start-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            padding: 20px;
        }

        #start-screen h1 {
            font-size: 40px;
            letter-spacing: 15px;
            margin-bottom: 10px;
        }

        #start-btn {
            margin-top: 40px;
            padding: 20px 50px;
            font-size: 18px;
            background: transparent;
            border: 2px solid #fff;
            color: #fff;
            font-family: inherit;
            letter-spacing: 5px;
        }

        .mobile-instructions {
            margin-top: 30px;
            color: #555;
            text-align: center;
            font-size: 12px;
            line-height: 1.8;
        }

        /* === JUMPSCARE (MOBİL) === */
        #jumpscare {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 99999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #jumpscare.active {
            display: flex;
            animation: flashRed 0.3s;
        }

        @keyframes flashRed {
            0% { background: #fff; }
            20% { background: #ff0000; }
            40% { background: #000; }
            60% { background: #ff0000; }
            100% { background: #000; }
        }

        #scare-face {
            width: 100vw;
            height: 60vh;
            background: #ff0000;
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
        }

        /* === VIGNETTE === */
        #vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 998;
        }

        #noise-overlay {
            position: fixed;
            inset: 0;
            opacity: 0.02;
            pointer-events: none;
            z-index: 997;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* === FPS COUNTER (DEBUG) === */
        #fps {
            position: fixed;
            top: 60px;
            right: 20px;
            font-size: 12px;
            color: #0f0;
            z-index: 7000;
            display: none;
        }
    </style>
</head>
<body>
    <!-- AYARLAR -->
    <button id="settings-btn" style="display: none;">⚙</button>
    
    <div id="settings-panel">
        <h2 style="margin-bottom: 40px; letter-spacing: 5px;">AYARLAR</h2>
        
        <div class="setting-item">
            <span class="setting-label">Grafik Kalitesi</span>
            <div class="setting-options">
                <button class="option-btn" data-quality="low" onclick="setQuality('low')">DÜŞÜK</button>
                <button class="option-btn active" data-quality="medium" onclick="setQuality('medium')">ORTA</button>
                <button class="option-btn" data-quality="high" onclick="setQuality('high')">YÜKSEK</button>
            </div>
        </div>

        <div class="setting-item">
            <span class="setting-label">Hassasiyet</span>
            <div class="slider-container">
                <input type="range" id="sensitivity" min="0.3" max="1.5" step="0.1" value="0.8">
            </div>
        </div>

        <div class="setting-item">
            <span class="setting-label">Fener Parlaklığı</span>
            <div class="slider-container">
                <input type="range" id="brightness" min="100" max="500" step="50" value="250">
            </div>
        </div>

        <div class="setting-item">
            <span class="setting-label">Ses Hassasiyeti</span>
            <div class="slider-container">
                <input type="range" id="mic-sensitivity" min="0.5" max="2" step="0.1" value="1">
            </div>
        </div>

        <button id="close-settings">KAPAT</button>
    </div>

    <div id="fps">FPS: 60</div>

    <!-- START -->
    <div id="start-screen">
        <h1>SESSİZLİK</h1>
        <p style="color: #333; font-size: 12px; letter-spacing: 5px;">MOBİL SÜRÜM</p>
        <button id="start-btn">BAŞLA</button>
        <div class="mobile-instructions">
            👆 EKRANA DOKUNARAK BAK<br>
            👈 JOYSTICK İLE HAREKET ET<br>
            🎤 SESİNİ KONTROL ET<br>
            <br>
            <span style="color: #ff0000;">KULAKLIK TAK</span>
        </div>
    </div>

    <!-- JUMPSCARE -->
    <div id="jumpscare">
        <div id="scare-face"></div>
        <div style="font-size: 40px; color: #ff0000; letter-spacing: 10px; margin-top: 20px;">ÖLDÜN</div>
        <button onclick="location.reload()" style="margin-top: 30px; padding: 15px 40px; font-size: 16px; background: #ff0000; border: none; color: #fff;">TEKRAR DENE</button>
    </div>

    <!-- OYUN -->
    <div id="world" style="display: none;">
        <div id="camera">
            <div class="room">
                <div class="face floor"></div>
                <div class="face ceiling"></div>
                <div class="face wall-front">
                    <div class="window"></div>
                </div>
                <div class="face wall-back"></div>
                <div class="face wall-left">
                    <div class="door door-left"></div>
                </div>
                <div class="face wall-right">
                    <div class="door door-right"></div>
                </div>

                <div class="furniture-simple table-simple"></div>
                <div class="furniture-simple chair-simple"></div>

                <div id="monster">
                    <div class="monster-mesh">
                        <div class="monster-eyes">
                            <div class="eye"></div>
                            <div class="eye"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="flashlight" style="display: none;"></div>
    <div id="darkness-overlay" style="display: none;"></div>
    <div id="vignette" style="display: none;"></div>
    <div id="noise-overlay" style="display: none;"></div>

    <!-- KONTROLLER -->
    <div id="joystick-zone" style="display: none;">
        <div id="joystick"></div>
    </div>
    <div id="look-zone" style="display: none;"></div>

    <!-- UI -->
    <div id="ui" style="display: none;">
        <div id="hud-panel">
            <div id="heart-monitor">♥ <span id="bpm">60</span></div>
            <div id="sound-display">
                <div id="sound-text">SESSIZ</div>
                <div id="sound-bar">
                    <div id="sound-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === AYARLAR SİSTEMİ ===
        const Settings = {
            quality: 'medium',
            sensitivity: 0.8,
            flashlightSize: 250,
            micGain: 1,
            showFPS: false
        };

        function setQuality(q) {
            Settings.quality = q;
            document.body.className = `quality-${q}`;
            document.querySelectorAll('[data-quality]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.quality === q);
            });
        }

        document.getElementById('sensitivity').addEventListener('input', (e) => {
            Settings.sensitivity = parseFloat(e.target.value);
        });

        document.getElementById('brightness').addEventListener('input', (e) => {
            Settings.flashlightSize = parseInt(e.target.value);
            document.getElementById('flashlight').style.width = e.target.value + 'px';
            document.getElementById('flashlight').style.height = e.target.value + 'px';
        });

        document.getElementById('mic-sensitivity').addEventListener('input', (e) => {
            Settings.micGain = parseFloat(e.target.value);
        });

        document.getElementById('settings-btn').addEventListener('click', () => {
            document.getElementById('settings-panel').classList.add('active');
            Game.state.isPlaying = false;
        });

        document.getElementById('close-settings').addEventListener('click', () => {
            document.getElementById('settings-panel').classList.remove('active');
            Game.state.isPlaying = true;
            gameLoop();
        });

        // === OYUN MOTORU ===
        const Game = {
            state: {
                isPlaying: false,
                isAlive: true,
                monsterDist: 1500,
                awareness: 0,
                camera: { x: 0, y: 0 },
                pos: { z: 0, x: 0 },
                heartRate: 60,
                soundAvg: 0
            },
            config: {
                fov: 600,
                moveSpeed: 3
            },
            audio: { ctx: null, analyser: null, data: null },
            input: { joystick: { x: 0, y: 0, active: false } }
        };

        // === JOYSTICK ===
        const joystickZone = document.getElementById('joystick-zone');
        const joystick = document.getElementById('joystick');
        let joystickCenter = { x: 0, y: 0 };

        joystickZone.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = joystickZone.getBoundingClientRect();
            joystickCenter = { 
                x: rect.left + rect.width / 2, 
                y: rect.top + rect.height / 2 
            };
            Game.input.joystick.active = true;
            updateJoystick(touch.clientX, touch.clientY);
        }, { passive: false });

        joystickZone.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (Game.input.joystick.active) {
                updateJoystick(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });

        joystickZone.addEventListener('touchend', (e) => {
            e.preventDefault();
            Game.input.joystick.active = false;
            Game.input.joystick.x = 0;
            Game.input.joystick.y = 0;
            joystick.style.transform = 'translate(0,0)';
        });

        function updateJoystick(x, y) {
            const maxDist = 45;
            let dx = x - joystickCenter.x;
            let dy = y - joystickCenter.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist > maxDist) {
                dx = (dx / dist) * maxDist;
                dy = (dy / dist) * maxDist;
            }
            
            joystick.style.transform = `translate(${dx}px, ${dy}px)`;
            joystick.classList.add('active');
            
            Game.input.joystick.x = dx / maxDist;
            Game.input.joystick.y = dy / maxDist;
        }

        // === LOOK (SAĞ TARAF) ===
        const lookZone = document.getElementById('look-zone');
        let lookStart = { x: 0, y: 0 };
        let cameraStart = { x: 0, y: 0 };

        lookZone.addEventListener('touchstart', (e) => {
            e.preventDefault();
            lookStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            cameraStart = { ...Game.state.camera };
        }, { passive: false });

        lookZone.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const dx = (e.touches[0].clientX - lookStart.x) / window.innerWidth;
            const dy = (e.touches[0].clientY - lookStart.y) / window.innerHeight;
            
            Game.state.camera.x = Math.max(-1, Math.min(1, cameraStart.x + dx * 2));
            Game.state.camera.y = Math.max(-1, Math.min(1, cameraStart.y + dy * 2));
            
            updateFlashlight(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        function updateFlashlight(x, y) {
            const fl = document.getElementById('flashlight');
            const dark = document.getElementById('darkness-overlay');
            fl.style.left = x + 'px';
            fl.style.top = y + 'px';
            dark.style.setProperty('--touch-x', x + 'px');
            dark.style.setProperty('--touch-y', y + 'px');
        }

        // === SES ===
        async function initAudio() {
            try {
                Game.audio.ctx = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    } 
                });
                
                const source = Game.audio.ctx.createMediaStreamSource(stream);
                Game.audio.analyser = Game.audio.ctx.createAnalyser();
                Game.audio.analyser.fftSize = 2048; // Mobilde daha düşük
                Game.audio.analyser.smoothingTimeConstant = 0.8;
                
                source.connect(Game.audio.analyser);
                Game.audio.data = new Uint8Array(Game.audio.analyser.frequencyBinCount);
            } catch (e) {
                alert('Mikrofon erişimi gerekli!');
            }
        }

        function getSoundLevel() {
            if (!Game.audio.analyser) return 0;
            Game.audio.analyser.getByteFrequencyData(Game.audio.data);
            
            let sum = 0;
            for (let i = 0; i < Game.audio.data.length; i++) {
                sum += Game.audio.data[i];
            }
            return Math.min(100, (sum / Game.audio.data.length / 255) * 100 * Settings.micGain);
        }

        // === OYUN DÖNGÜSÜ ===
        let lastTime = 0;
        let frameCount = 0;
        let lastFpsTime = 0;

        function gameLoop(time) {
            if (!Game.state.isPlaying || !Game.state.isAlive) return;
            
            // FPS
            if (Settings.showFPS) {
                frameCount++;
                if (time - lastFpsTime >= 1000) {
                    document.getElementById('fps').textContent = 'FPS: ' + frameCount;
                    frameCount = 0;
                    lastFpsTime = time;
                }
            }

            const rawLevel = getSoundLevel();
            Game.state.soundAvg = Game.state.soundAvg * 0.85 + rawLevel * 0.15;
            
            updateMonster(Game.state.soundAvg);
            updateUI(Game.state.soundAvg);
            updateMovement();
            
            requestAnimationFrame(gameLoop);
        }

        function updateMonster(sound) {
            let speed = 0;
            let detect = 0;

            if (sound < 5) { speed = -0.5; detect = -0.2; }
            else if (sound < 15) { speed = 0.3; detect = 0.1; }
            else if (sound < 35) { speed = 2; detect = 0.4; }
            else if (sound < 60) { speed = 5; detect = 1.5; }
            else { speed = 12; detect = 4; }

            Game.state.awareness += detect;
            Game.state.awareness = Math.max(0, Math.min(100, Game.state.awareness));

            if (Game.state.awareness > 15) {
                Game.state.monsterDist -= speed;
            } else {
                Game.state.monsterDist += (Math.random() - 0.3) * 0.5;
            }

            Game.state.monsterDist = Math.max(50, Math.min(2500, Game.state.monsterDist));

            const m = document.getElementById('monster');
            m.className = '';
            if (Game.state.monsterDist > 800) m.classList.add('far');
            else if (Game.state.monsterDist > 400) m.classList.add('medium');
            else if (Game.state.monsterDist > 150) m.classList.add('close');
            else m.classList.add('attacking');

            if (Game.state.monsterDist <= 120 && sound > 3) death();

            const danger = Math.max(0, (800 - Game.state.monsterDist) / 800);
            Game.state.heartRate = 60 + Math.floor(danger * 100);
        }

        function updateUI(sound) {
            document.getElementById('sound-fill').style.width = sound + '%';
            const labels = ['SESSIZ', 'FISILTI', 'NORMAL', 'YUKSEK', 'CIGLIK!'];
            const thresholds = [5, 15, 35, 60, 100];
            let label = labels[0];
            for (let i = 0; i < thresholds.length; i++) {
                if (sound >= thresholds[i]) label = labels[i];
            }
            document.getElementById('sound-text').textContent = label;
            
            const hm = document.getElementById('heart-monitor');
            document.getElementById('bpm').textContent = Game.state.heartRate;
            if (Game.state.monsterDist < 600) hm.classList.add('danger');
            else hm.classList.remove('danger');
        }

        function updateMovement() {
            // Joystick hareketi
            if (Game.input.joystick.active) {
                Game.state.pos.z -= Game.input.joystick.y * Game.config.moveSpeed;
                Game.state.pos.x += Game.input.joystick.x * Game.config.moveSpeed * 0.5;
            }

            Game.state.pos.z = Math.max(-800, Math.min(300, Game.state.pos.z));
            Game.state.pos.x = Math.max(-400, Math.min(400, Game.state.pos.x));

            const cam = document.getElementById('camera');
            const rotX = -Game.state.camera.y * 35 * Settings.sensitivity;
            const rotY = Game.state.camera.x * 45 * Settings.sensitivity;
            cam.style.transform = `translateZ(${Game.config.fov}px) rotateX(${rotX}deg) rotateY(${rotY}deg) translateZ(${Game.state.pos.z}px) translateX(${Game.state.pos.x}px)`;
        }

        function death() {
            Game.state.isAlive = false;
            document.getElementById('jumpscare').classList.add('active');
            try {
                const osc = Game.audio.ctx.createOscillator();
                const gain = Game.audio.ctx.createGain();
                osc.frequency.setValueAtTime(150, Game.audio.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(20, Game.audio.ctx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.8, Game.audio.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, Game.audio.ctx.currentTime + 0.4);
                osc.connect(gain);
                gain.connect(Game.audio.ctx.destination);
                osc.start();
                osc.stop(Game.audio.ctx.currentTime + 0.4);
            } catch(e) {}
        }

        // === BAŞLAT ===
        document.getElementById('start-btn').addEventListener('click', async () => {
            await initAudio();
            
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('world').style.display = 'block';
                document.getElementById('flashlight').style.display = 'block';
                document.getElementById('darkness-overlay').style.display = 'block';
                document.getElementById('vignette').style.display = 'block';
                document.getElementById('noise-overlay').style.display = 'block';
                document.getElementById('joystick-zone').style.display = 'block';
                document.getElementById('look-zone').style.display = 'block';
                document.getElementById('ui').style.display = 'block';
                document.getElementById('settings-btn').style.display = 'flex';
                
                if (Settings.showFPS) document.getElementById('fps').style.display = 'block';
                
                Game.state.isPlaying = true;
                gameLoop(0);
            }, 500);
        });

        // Orijinal touch davranışını engelle
        document.addEventListener('touchmove', (e) => {
            if (e.target.closest('#joystick-zone') || e.target.closest('#look-zone')) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
