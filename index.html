<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SESSİZLİK - Ses Kontrollü Korku</title>
    <script>
        // MOBİL DEDEKTÖR - Sayfa yüklenmeden yönlendir
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) 
            || (window.matchMedia && window.matchMedia("(max-width: 768px)").matches)
            || ('ontouchstart' in window && navigator.maxTouchPoints > 0);
        
        if (isMobile && !window.location.href.includes('mobile.html')) {
            window.location.href = 'mobile.html';
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: #fff;
            cursor: none;
        }

        /* === 3D MOTOR === */
        #world {
            position: fixed;
            inset: 0;
            perspective: 800px;
            overflow: hidden;
        }

        #camera {
            position: absolute;
            width: 0;
            height: 0;
            left: 50%;
            top: 50%;
            transform-style: preserve-3d;
            transition: transform 0.05s linear;
        }

        /* === ODA === */
        .room {
            position: absolute;
            width: 2000px;
            height: 1000px;
            left: -1000px;
            top: -500px;
            transform-style: preserve-3d;
        }

        .face {
            position: absolute;
            backface-visibility: hidden;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
        }

        .floor {
            width: 2000px;
            height: 2000px;
            background: 
                repeating-linear-gradient(0deg, #1a1a1a 0px, #1a1a1a 100px, #151515 100px, #151515 200px),
                repeating-linear-gradient(90deg, transparent 0px, transparent 100px, rgba(0,0,0,0.3) 100px, rgba(0,0,0,0.3) 102px);
            transform: rotateX(90deg) translateZ(-500px);
            transform-origin: center;
        }

        .ceiling {
            width: 2000px;
            height: 2000px;
            background: 
                radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%),
                repeating-linear-gradient(90deg, #0f0f0f 0px, #0f0f0f 50px, #0a0a0a 50px, #0a0a0a 100px);
            transform: rotateX(-90deg) translateZ(-500px);
            transform-origin: center;
        }

        .wall-front {
            width: 2000px;
            height: 1000px;
            background: 
                linear-gradient(180deg, #0a0a0a 0%, #151515 50%, #0a0a0a 100%),
                repeating-linear-gradient(90deg, transparent 0px, transparent 198px, rgba(0,0,0,0.5) 198px, rgba(0,0,0,0.5) 200px);
            transform: translateZ(-1000px);
        }

        .wall-back {
            width: 2000px;
            height: 1000px;
            background: linear-gradient(180deg, #050505 0%, #101010 50%, #050505 100%);
            transform: rotateY(180deg) translateZ(-1000px);
        }

        .wall-left {
            width: 2000px;
            height: 1000px;
            left: -1000px;
            background: 
                linear-gradient(90deg, #000 0%, #151515 50%, #000 100%),
                repeating-linear-gradient(0deg, transparent 0px, transparent 198px, rgba(0,0,0,0.5) 198px, rgba(0,0,0,0.5) 200px);
            transform: rotateY(90deg) translateZ(-1000px);
        }

        .wall-right {
            width: 2000px;
            height: 1000px;
            right: -1000px;
            background: 
                linear-gradient(-90deg, #000 0%, #151515 50%, #000 100%),
                repeating-linear-gradient(0deg, transparent 0px, transparent 198px, rgba(0,0,0,0.5) 198px, rgba(0,0,0,0.5) 200px);
            transform: rotateY(-90deg) translateZ(-1000px);
        }

        /* === DETAYLAR === */
        .window {
            position: absolute;
            width: 300px;
            height: 400px;
            left: 50%;
            top: 100px;
            transform: translateX(-50%) translateZ(-995px);
            background: linear-gradient(180deg, #000510 0%, #001020 50%, #000510 100%);
            border: 10px solid #1a1a1a;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9);
            overflow: hidden;
        }

        .window::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(45deg, transparent 0px, transparent 20px, rgba(255,255,255,0.02) 20px, rgba(255,255,255,0.02) 22px);
            animation: rain 8s linear infinite;
        }

        @keyframes rain {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .door {
            position: absolute;
            width: 200px;
            height: 400px;
            background: #000;
            border: 3px solid #1a1a1a;
            box-shadow: 0 0 50px rgba(0,0,0,0.9), inset 0 0 30px rgba(50,0,0,0.3);
        }

        .door-left { left: 300px; top: 300px; transform: translateZ(-995px); }
        .door-right { right: 300px; top: 300px; transform: translateZ(-995px); }

        .furniture {
            position: absolute;
            transform-style: preserve-3d;
        }

        .table {
            width: 200px;
            height: 100px;
            left: -400px;
            top: 200px;
            transform: translateZ(-800px);
        }

        .table-top {
            position: absolute;
            width: 200px;
            height: 300px;
            background: #2a1a1a;
            transform: rotateX(90deg) translateZ(100px);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .table-leg {
            position: absolute;
            width: 20px;
            height: 100px;
            background: #1a0f0f;
        }

        .leg-1 { transform: translate3d(20px, 50px, 80px); }
        .leg-2 { transform: translate3d(160px, 50px, 80px); }
        .leg-3 { transform: translate3d(20px, 50px, -80px); }
        .leg-4 { transform: translate3d(160px, 50px, -80px); }

        .chair {
            width: 100px;
            height: 100px;
            right: -300px;
            top: 400px;
            transform: translateZ(-600px) rotateZ(45deg) rotateX(80deg);
        }

        .chair-seat {
            position: absolute;
            width: 100px;
            height: 100px;
            background: #3a2a2a;
            transform: rotateX(90deg);
        }

        .chair-back {
            position: absolute;
            width: 100px;
            height: 120px;
            background: #2a1a1a;
            transform: translateZ(-50px);
        }

        .blood {
            position: absolute;
            width: 150px;
            height: 150px;
            background: 
                radial-gradient(circle at 30% 30%, #800 0%, #300 40%, transparent 70%),
                radial-gradient(circle at 70% 70%, #600 0%, #200 30%, transparent 60%);
            filter: blur(2px);
            opacity: 0.6;
        }

        .blood-1 { left: 200px; top: 600px; transform: translateZ(-999px) rotateX(-90deg); }

        /* === YARATIK === */
        #monster {
            position: absolute;
            width: 150px;
            height: 350px;
            left: 50%;
            top: 50%;
            margin-left: -75px;
            margin-top: -175px;
            transform-style: preserve-3d;
            opacity: 0;
            transition: all 0.3s ease-out;
        }

        .monster-mesh {
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(180deg, transparent 0%, rgba(20,0,0,0.3) 100%),
                repeating-linear-gradient(90deg, #000 0px, #000 2px, #1a0000 2px, #1a0000 4px);
            clip-path: polygon(25% 0%, 75% 0%, 100% 100%, 0% 100%);
            position: relative;
            filter: blur(1px);
        }

        .monster-eyes {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            display: flex;
            justify-content: space-between;
        }

        .eye {
            width: 30px;
            height: 8px;
            background: #ff0000;
            border-radius: 50%;
            box-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000;
            animation: eyePulse 2s infinite;
        }

        @keyframes eyePulse {
            0%, 100% { opacity: 0.4; height: 4px; }
            50% { opacity: 1; height: 12px; }
        }

        #monster.far { transform: translateZ(-1500px) scale(0.4); opacity: 0.2; filter: blur(10px); }
        #monster.medium { transform: translateZ(-800px) scale(0.8); opacity: 0.6; filter: blur(4px); }
        #monster.close { transform: translateZ(-400px) scale(1.2); opacity: 0.9; filter: blur(1px); }
        #monster.attacking { transform: translateZ(-100px) scale(2); opacity: 1; filter: blur(0); }

        /* === EL FENERİ === */
        #flashlight {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            mix-blend-mode: soft-light;
            background: radial-gradient(circle at 30% 30%,
                rgba(255, 255, 240, 1) 0%,
                rgba(255, 255, 200, 0.8) 10%,
                rgba(255, 240, 150, 0.4) 30%,
                rgba(255, 200, 100, 0.1) 50%,
                transparent 70%);
            transform: translate(-50%, -50%);
            filter: blur(8px);
        }

        #flashlight::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%,
                rgba(255, 255, 255, 0.9) 0%,
                rgba(255, 255, 200, 0.5) 20%,
                transparent 60%);
            filter: blur(2px);
        }

        #darkness-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
                transparent 0%,
                transparent 100px,
                rgba(0, 0, 0, 0.4) 200px,
                rgba(0, 0, 0, 0.85) 400px,
                rgba(0, 0, 0, 0.98) 600px);
            pointer-events: none;
            z-index: 999;
        }

        /* === UI === */
        #ui {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 2000;
        }

        #crosshair {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            opacity: 0.3;
        }

        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.5);
        }

        #crosshair::before { width: 2px; height: 20px; left: 9px; top: 0; }
        #crosshair::after { width: 20px; height: 2px; left: 0; top: 9px; }

        #hud-panel {
            position: absolute;
            bottom: 30px;
            left: 30px;
            right: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        #heart-monitor {
            font-size: 20px;
            color: #ff3333;
            text-shadow: 0 0 10px #ff0000;
        }

        #heart-monitor.danger {
            animation: heartbeat 0.6s infinite;
            font-size: 28px;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        #sound-display { text-align: right; }

        #sound-bar {
            width: 250px;
            height: 15px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #333;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        #sound-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0f0, #ff0, #f00);
            transition: width 0.1s;
        }

        #sound-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            letter-spacing: 2px;
        }

        /* === START SCREEN === */
        #start-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 1s;
        }

        #start-screen h1 {
            font-size: 80px;
            letter-spacing: 30px;
            margin-bottom: 10px;
            animation: titleBreath 4s infinite;
        }

        @keyframes titleBreath {
            0%, 100% { opacity: 1; text-shadow: 0 0 20px rgba(255,0,0,0.3); }
            50% { opacity: 0.7; text-shadow: 0 0 40px rgba(255,0,0,0.6); }
        }

        #start-btn {
            margin-top: 50px;
            padding: 20px 60px;
            font-size: 24px;
            background: transparent;
            border: 2px solid #fff;
            color: #fff;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 8px;
            transition: all 0.3s;
        }

        #start-btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 40px rgba(255,255,255,0.3);
        }

        .instructions {
            margin-top: 40px;
            color: #444;
            text-align: center;
            line-height: 2;
            font-size: 14px;
        }

        /* === JUMPSCARE === */
        #jumpscare {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 99999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #jumpscare.active {
            display: flex;
            animation: flashRed 0.3s;
        }

        @keyframes flashRed {
            0% { background: #fff; }
            20% { background: #ff0000; }
            40% { background: #000; }
            60% { background: #ff0000; }
            100% { background: #000; }
        }

        #scare-face {
            width: 100vw;
            height: 100vh;
            background: 
                radial-gradient(circle at 50% 50%, #ff0000 0%, #000 30%),
                repeating-radial-gradient(circle at 50% 50%, #000 0px, #000 10px, #300 10px, #300 20px);
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            animation: scareShake 0.1s infinite;
        }

        @keyframes scareShake {
            0%, 100% { transform: translate(-5px, -5px) scale(1.1); }
            50% { transform: translate(5px, 5px) scale(1.1); }
        }

        /* === AMBIYANS === */
        #vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
            z-index: 998;
        }

        #noise-overlay {
            position: fixed;
            inset: 0;
            opacity: 0.03;
            pointer-events: none;
            z-index: 997;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1>SESSİZLİK</h1>
        <p style="color: #333; letter-spacing: 10px;">SESİN SENİN DÜŞMANIN</p>
        <button id="start-btn">BAŞLA</button>
        <div class="instructions">
            🎧 KULAKLIK ZORUNLU<br>
            🎤 MİKROFON AÇIK OLMALI<br>
            🖱️ MOUSE İLE BAK<br>
            ⌨️ WASD İLE HAREKET ET<br>
            <br>
            <span style="color: #ff0000;">FIŞILDA YA DA ÖL</span>
        </div>
    </div>

    <div id="jumpscare">
        <div id="scare-face"></div>
        <div style="margin-top: -100px; font-size: 60px; color: #ff0000; letter-spacing: 20px; z-index: 1;">ÖLDÜN</div>
        <button onclick="location.reload()" style="margin-top: 50px; padding: 20px 50px; font-size: 20px; background: #ff0000; border: none; color: #fff; cursor: pointer; z-index: 1; font-family: inherit;">TEKRAR DENE</button>
    </div>

    <div id="world" style="display: none;">
        <div id="camera">
            <div class="room">
                <div class="face floor"></div>
                <div class="face ceiling"></div>
                <div class="face wall-front">
                    <div class="window"></div>
                </div>
                <div class="face wall-back"></div>
                <div class="face wall-left">
                    <div class="door door-left"></div>
                </div>
                <div class="face wall-right">
                    <div class="door door-right"></div>
                </div>

                <div class="furniture table">
                    <div class="table-top"></div>
                    <div class="table-leg leg-1"></div>
                    <div class="table-leg leg-2"></div>
                    <div class="table-leg leg-3"></div>
                    <div class="table-leg leg-4"></div>
                </div>

                <div class="furniture chair">
                    <div class="chair-seat"></div>
                    <div class="chair-back"></div>
                </div>

                <div class="blood blood-1"></div>

                <div id="monster">
                    <div class="monster-mesh">
                        <div class="monster-eyes">
                            <div class="eye"></div>
                            <div class="eye"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="flashlight" style="display: none;"></div>
    <div id="darkness-overlay" style="display: none;"></div>
    <div id="vignette" style="display: none;"></div>
    <div id="noise-overlay" style="display: none;"></div>

    <div id="ui" style="display: none;">
        <div id="crosshair"></div>
        <div id="hud-panel">
            <div id="heart-monitor">♥ <span id="bpm">60</span> BPM</div>
            <div id="sound-display">
                <div id="sound-text">SESSIZ</div>
                <div id="sound-bar">
                    <div id="sound-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const Game = {
            state: {
                isPlaying: false,
                isAlive: true,
                monsterDist: 2000,
                awareness: 0,
                camera: { x: 0, y: 0 },
                pos: { z: 0 },
                keys: {},
                heartRate: 60,
                soundAvg: 0
            },
            config: {
                mouseSensitivity: 0.8,
                moveSpeed: 100,
                fov: 800
            },
            audio: { ctx: null, analyser: null, data: null }
        };

        async function initAudio() {
            try {
                Game.audio.ctx = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    } 
                });
                
                const source = Game.audio.ctx.createMediaStreamSource(stream);
                Game.audio.analyser = Game.audio.ctx.createAnalyser();
                Game.audio.analyser.fftSize = 4096;
                Game.audio.analyser.smoothingTimeConstant = 0.85;
                
                source.connect(Game.audio.analyser);
                Game.audio.data = new Uint8Array(Game.audio.analyser.frequencyBinCount);
            } catch (e) {
                alert('Mikrofon gerekli! ' + e.message);
            }
        }

        function getSoundLevel() {
            if (!Game.audio.analyser) return 0;
            Game.audio.analyser.getByteFrequencyData(Game.audio.data);
            
            let sum = 0;
            let weightSum = 0;
            for (let i = 0; i < Game.audio.data.length; i++) {
                const weight = 1 / (1 + i * 0.01);
                sum += Game.audio.data[i] * weight;
                weightSum += weight;
            }
            const avg = sum / weightSum;
            return Math.min(100, (avg / 255) * 150);
        }

        function gameLoop() {
            if (!Game.state.isPlaying || !Game.state.isAlive) return;
            const rawLevel = getSoundLevel();
            Game.state.soundAvg = Game.state.soundAvg * 0.9 + rawLevel * 0.1;
            
            updateMonster(Game.state.soundAvg);
            updateUI(Game.state.soundAvg);
            updateMovement();
            requestAnimationFrame(gameLoop);
        }

        function updateMonster(sound) {
            let speed = 0;
            let detect = 0;

            if (sound < 5) { speed = -1; detect = -0.3; }
            else if (sound < 15) { speed = 0.5; detect = 0.1; }
            else if (sound < 35) { speed = 3; detect = 0.5; }
            else if (sound < 60) { speed = 8; detect = 2; }
            else { speed = 20; detect = 5; }

            Game.state.awareness += detect;
            Game.state.awareness = Math.max(0, Math.min(100, Game.state.awareness));

            if (Game.state.awareness > 15) {
                Game.state.monsterDist -= speed;
            } else {
                Game.state.monsterDist += (Math.random() - 0.3);
            }

            Game.state.monsterDist = Math.max(50, Math.min(3000, Game.state.monsterDist));

            const m = document.getElementById('monster');
            m.className = '';
            if (Game.state.monsterDist > 1200) m.classList.add('far');
            else if (Game.state.monsterDist > 600) m.classList.add('medium');
            else if (Game.state.monsterDist > 200) m.classList.add('close');
            else m.classList.add('attacking');

            if (Game.state.monsterDist <= 150 && sound > 3) death();

            const danger = Math.max(0, (1000 - Game.state.monsterDist) / 1000);
            Game.state.heartRate = 60 + Math.floor(danger * 120);
        }

        function updateUI(sound) {
            document.getElementById('sound-fill').style.width = sound + '%';
            const labels = ['SESSIZ', 'FISILTI', 'NORMAL', 'YUKSEK', 'CIGLIK!'];
            const thresholds = [5, 15, 35, 60, 100];
            let label = labels[0];
            for (let i = 0; i < thresholds.length; i++) {
                if (sound >= thresholds[i]) label = labels[i];
            }
            document.getElementById('sound-text').textContent = label;
            document.getElementById('sound-text').style.color = 
                sound > 60 ? '#ff0000' : sound > 35 ? '#ffaa00' : '#666';

            const hm = document.getElementById('heart-monitor');
            document.getElementById('bpm').textContent = Game.state.heartRate;
            if (Game.state.monsterDist < 800) hm.classList.add('danger');
            else hm.classList.remove('danger');
        }

        function updateMovement() {
            if (Game.state.keys['w'] || Game.state.keys['W']) Game.state.pos.z -= Game.config.moveSpeed;
            if (Game.state.keys['s'] || Game.state.keys['S']) Game.state.pos.z += Game.config.moveSpeed;
            Game.state.pos.z = Math.max(-1500, Math.min(500, Game.state.pos.z));
            
            const cam = document.getElementById('camera');
            const rotX = -Game.state.camera.y * 45;
            const rotY = Game.state.camera.x * 60;
            cam.style.transform = `translateZ(${Game.config.fov}px) rotateX(${rotX}deg) rotateY(${rotY}deg) translateZ(${Game.state.pos.z}px)`;
        }

        function death() {
            Game.state.isAlive = false;
            document.getElementById('jumpscare').classList.add('active');
            try {
                const osc = Game.audio.ctx.createOscillator();
                const gain = Game.audio.ctx.createGain();
                osc.frequency.setValueAtTime(100, Game.audio.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, Game.audio.ctx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.5, Game.audio.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, Game.audio.ctx.currentTime + 0.5);
                osc.connect(gain);
                gain.connect(Game.audio.ctx.destination);
                osc.start();
                osc.stop(Game.audio.ctx.currentTime + 0.5);
            } catch(e) {}
        }

        document.addEventListener('mousemove', (e) => {
            if (!Game.state.isPlaying) return;
            Game.state.camera.x = (e.clientX / window.innerWidth - 0.5) * 2;
            Game.state.camera.y = (e.clientY / window.innerHeight - 0.5) * 2;
            
            const fl = document.getElementById('flashlight');
            const dark = document.getElementById('darkness-overlay');
            fl.style.left = e.clientX + 'px';
            fl.style.top = e.clientY + 'px';
            dark.style.setProperty('--mouse-x', e.clientX + 'px');
            dark.style.setProperty('--mouse-y', e.clientY + 'px');
        });

        document.addEventListener('keydown', (e) => Game.state.keys[e.key] = true);
        document.addEventListener('keyup', (e) => Game.state.keys[e.key] = false);

        document.getElementById('start-btn').addEventListener('click', async () => {
            await initAudio();
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('world').style.display = 'block';
                document.getElementById('flashlight').style.display = 'block';
                document.getElementById('darkness-overlay').style.display = 'block';
                document.getElementById('vignette').style.display = 'block';
                document.getElementById('noise-overlay').style.display = 'block';
                document.getElementById('ui').style.display = 'block';
                Game.state.isPlaying = true;
                gameLoop();
            }, 1000);
        });
    </script>
</body>
</html>
