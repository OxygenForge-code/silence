<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessizlik | Ses-Kontrollü Korku</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: #fff;
            user-select: none;
        }

        /* === 3D SAHNE MOTORU === */
        #viewport {
            width: 100vw;
            height: 100vh;
            perspective: 1000px;
            overflow: hidden;
            position: relative;
        }

        #camera {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* === ODA GEOMETRİSİ === */
        .room {
            position: absolute;
            width: 4000px;
            height: 2000px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) translateZ(-2000px);
            transform-style: preserve-3d;
        }

        /* Tavan */
        .ceiling {
            position: absolute;
            width: 4000px;
            height: 4000px;
            background: 
                linear-gradient(90deg, rgba(20,20,20,1) 0%, rgba(10,10,10,1) 50%, rgba(20,20,20,1) 100%),
                repeating-linear-gradient(0deg, transparent 0px, transparent 100px, rgba(0,0,0,0.3) 100px, rgba(0,0,0,0.3) 102px);
            transform: rotateX(90deg) translateZ(-1000px);
            transform-origin: center;
        }

        /* Zemin */
        .floor {
            position: absolute;
            width: 4000px;
            height: 4000px;
            background: 
                repeating-linear-gradient(90deg, #1a1a1a 0px, #1a1a1a 100px, #151515 100px, #151515 200px),
                repeating-linear-gradient(0deg, transparent 0px, transparent 200px, rgba(0,0,0,0.5) 200px, rgba(0,0,0,0.5) 202px);
            transform: rotateX(-90deg) translateZ(-1000px);
            transform-origin: center;
            box-shadow: inset 0 0 500px rgba(0,0,0,0.9);
        }

        /* Duvarlar - Gerçek 3D derinlik için */
        .wall {
            position: absolute;
            background: 
                linear-gradient(180deg, #0a0a0a 0%, #1a1a1a 30%, #1a1a1a 70%, #0a0a0a 100%),
                repeating-linear-gradient(90deg, transparent 0px, transparent 198px, rgba(0,0,0,0.4) 198px, rgba(0,0,0,0.4) 200px);
            transform-style: preserve-3d;
        }

        .wall-left {
            width: 4000px;
            height: 2000px;
            left: -2000px;
            top: -1000px;
            transform: rotateY(90deg) translateZ(-2000px);
        }

        .wall-right {
            width: 4000px;
            height: 2000px;
            right: -2000px;
            top: -1000px;
            transform: rotateY(-90deg) translateZ(-2000px);
        }

        .wall-front {
            width: 4000px;
            height: 2000px;
            left: -2000px;
            top: -1000px;
            transform: translateZ(-2000px);
            background: 
                linear-gradient(180deg, #050505 0%, #151515 50%, #050505 100%),
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%23000" opacity="0.3" x="20" y="20" width="60" height="80"/></svg>');
            background-size: 100% 100%, 200px 300px;
        }

        /* Kapı aralıkları */
        .doorway {
            position: absolute;
            width: 300px;
            height: 500px;
            background: #000;
            box-shadow: 0 0 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(20,0,0,0.5);
            border: 2px solid #1a1a1a;
        }

        .doorway-left { left: 500px; top: 500px; transform: translateZ(-1990px); }
        .doorway-right { right: 500px; top: 500px; transform: translateZ(-1990px); }

        /* === EL FENERİ === */
        #flashlight {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, 
                rgba(255,255,240,0.9) 0%, 
                rgba(255,255,200,0.4) 20%, 
                rgba(255,200,100,0.1) 50%, 
                transparent 70%);
            pointer-events: none;
            mix-blend-mode: screen;
            filter: blur(1px);
            transform: translate(-50%, -50%);
            z-index: 100;
            transition: opacity 0.2s;
        }

        #flashlight::after {
            content: '';
            position: absolute;
            inset: -100px;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.95) 70%);
            border-radius: 50%;
        }

        /* === YARATIK === */
        #monster {
            position: absolute;
            width: 200px;
            height: 400px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) translateZ(-1000px);
            transform-style: preserve-3d;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 50;
        }

        .monster-body {
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 50% 20%, #2a0000 0%, #000 70%),
                linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.8) 100%);
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            filter: blur(2px);
            position: relative;
        }

        .monster-eyes {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .eye {
            width: 40px;
            height: 15px;
            background: #ff0000;
            border-radius: 50%;
            box-shadow: 0 0 30px #ff0000, 0 0 60px #ff0000;
            animation: eyeFlicker 3s infinite;
        }

        @keyframes eyeFlicker {
            0%, 100% { opacity: 0.3; transform: scaleY(0.3); }
            50% { opacity: 1; transform: scaleY(1); }
            52% { opacity: 0.1; }
            54% { opacity: 1; }
        }

        /* Yaratık mesafe durumları */
        #monster.far { transform: translate(-50%, -50%) translateZ(-2000px) scale(0.5); opacity: 0.3; filter: blur(5px); }
        #monster.medium { transform: translate(-50%, -50%) translateZ(-1000px) scale(1); opacity: 0.7; filter: blur(2px); }
        #monster.close { transform: translate(-50%, -50%) translateZ(-500px) scale(1.5); opacity: 0.9; filter: blur(1px); }
        #monster.attacking { 
            transform: translate(-50%, -50%) translateZ(200px) scale(3); 
            opacity: 1; 
            filter: blur(0);
            animation: attackShake 0.1s infinite;
        }

        @keyframes attackShake {
            0%, 100% { transform: translate(-50%, -50%) translateZ(200px) scale(3) rotate(-2deg); }
            50% { transform: translate(-50%, -50%) translateZ(200px) scale(3) rotate(2deg); }
        }

        /* === UI ELEMENTLERİ === */
        #hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 200;
        }

        #heart-rate {
            position: absolute;
            bottom: 50px;
            left: 50px;
            font-size: 24px;
            color: #ff4444;
            text-shadow: 0 0 10px #ff0000;
            opacity: 0;
            transition: opacity 0.5s;
        }

        #heart-rate.danger {
            animation: heartbeat 0.5s infinite;
            opacity: 1;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        #sound-meter {
            position: absolute;
            bottom: 50px;
            right: 50px;
            width: 300px;
            height: 20px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #333;
            border-radius: 10px;
            overflow: hidden;
        }

        #sound-level {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ff00 0%, #ffff00 50%, #ff0000 100%);
            transition: width 0.1s;
        }

        #sound-label {
            position: absolute;
            top: -30px;
            right: 0;
            font-size: 14px;
            color: #888;
        }

        /* === START SCREEN === */
        #start-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s;
        }

        #start-screen h1 {
            font-size: 72px;
            letter-spacing: 20px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255,0,0,0.5);
            animation: titleFlicker 4s infinite;
        }

        @keyframes titleFlicker {
            0%, 90%, 100% { opacity: 1; }
            95% { opacity: 0.3; }
        }

        #start-btn {
            padding: 20px 60px;
            font-size: 24px;
            background: transparent;
            border: 2px solid #fff;
            color: #fff;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 5px;
            transition: all 0.3s;
            margin-top: 40px;
        }

        #start-btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 30px rgba(255,255,255,0.5);
        }

        #warning {
            margin-top: 30px;
            color: #666;
            font-size: 14px;
            max-width: 500px;
            text-align: center;
            line-height: 1.6;
        }

        /* === JUMPSCARE OVERLAY === */
        #jumpscare {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #jumpscare.active {
            display: flex;
            animation: jumpscareFlash 0.5s;
        }

        @keyframes jumpscareFlash {
            0% { background: #fff; }
            10% { background: #ff0000; }
            20% { background: #000; }
            30% { background: #ff0000; }
            100% { background: #000; }
        }

        #jumpscare-face {
            width: 80vw;
            height: 80vh;
            background: 
                radial-gradient(circle at 30% 30%, #ff0000 0%, #000 50%),
                repeating-conic-gradient(from 0deg at 50% 50%, #000 0deg 10deg, #330000 10deg 20deg);
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            animation: faceDistort 0.2s infinite;
        }

        @keyframes faceDistort {
            0%, 100% { transform: scale(1) rotate(0deg); filter: blur(0); }
            50% { transform: scale(1.1) rotate(2deg); filter: blur(2px); }
        }

        /* === GÖLGE EFEKTİ === */
        .shadow-warning {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            opacity: 0;
            transition: opacity 1s;
            pointer-events: none;
            z-index: 90;
        }

        .shadow-warning.active {
            opacity: 1;
        }

        /* === NOISE OVERLAY === */
        #noise {
            position: fixed;
            inset: 0;
            opacity: 0.05;
            pointer-events: none;
            z-index: 150;
            background-image: url('data:image/svg+xml,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)"/></svg>');
        }
    </style>
</head>
<body>
    <!-- START SCREEN -->
    <div id="start-screen">
        <h1>SESSİZLİK</h1>
        <p style="color: #666; letter-spacing: 5px;">SESİNİZ SİZİN DÜŞMANINIZDIR</p>
        <button id="start-btn">BAŞLA</button>
        <div id="warning">
            🎧 Kulaklık takmanız şiddetle tavsiye edilir<br>
            🎤 Mikrofon erişimi gereklidir<br>
            📱 Telefonunuzu sessize alın<br>
            ⚠️ Yüksek ses çıkarmak ölümünüz olabilir
        </div>
    </div>

    <!-- JUMPSCARE -->
    <div id="jumpscare">
        <div id="jumpscare-face"></div>
        <div style="margin-top: 40px; font-size: 48px; letter-spacing: 10px; color: #ff0000;">ÖLDÜN</div>
        <button onclick="location.reload()" style="margin-top: 40px; padding: 15px 40px; font-size: 18px; background: #ff0000; border: none; color: #fff; cursor: pointer; font-family: inherit;">TEKRAR DENE</button>
    </div>

    <!-- OYUN -->
    <div id="viewport" style="display: none;">
        <div id="noise"></div>
        <div class="shadow-warning" id="shadow-warning"></div>
        
        <div id="camera">
            <div class="room">
                <div class="ceiling"></div>
                <div class="floor"></div>
                <div class="wall wall-left"></div>
                <div class="wall wall-right"></div>
                <div class="wall wall-front"></div>
                <div class="doorway doorway-left"></div>
                <div class="doorway doorway-right"></div>
                
                <div id="monster">
                    <div class="monster-body">
                        <div class="monster-eyes">
                            <div class="eye"></div>
                            <div class="eye"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="flashlight"></div>

        <div id="hud">
            <div id="heart-rate">♥ <span id="bpm">60</span> BPM</div>
            <div id="sound-meter">
                <div id="sound-label">SES SEVİYESİ</div>
                <div id="sound-level"></div>
            </div>
        </div>
    </div>

    <script>
        // === OYUN DURUMU ===
        const State = {
            distance: 2000,      // Yaratık mesafesi (px/Z)
            awareness: 0,        // Yaratık farkındalığı (0-100)
            isAlive: true,
            isPlaying: false,
            mouseX: 0,
            mouseY: 0,
            cameraRotX: 0,
            cameraRotY: 0,
            lastSoundLevel: 0,
            soundHistory: [],    // Ortalama almak için
            heartRate: 60
        };

        // === DOM ELEMENTLERİ ===
        const els = {
            startScreen: document.getElementById('start-screen'),
            viewport: document.getElementById('viewport'),
            camera: document.getElementById('camera'),
            monster: document.getElementById('monster'),
            flashlight: document.getElementById('flashlight'),
            soundLevel: document.getElementById('sound-level'),
            soundLabel: document.getElementById('sound-label'),
            heartRate: document.getElementById('heart-rate'),
            bpm: document.getElementById('bpm'),
            jumpscare: document.getElementById('jumpscare'),
            shadowWarning: document.getElementById('shadow-warning')
        };

        // === SES ANALİZİ ===
        let audioContext, analyser, microphone, dataArray;

        async function initAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                microphone = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                analyser.smoothingTimeConstant = 0.8;
                
                microphone.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                console.log('🎤 Mikrofon aktif');
            } catch (err) {
                alert('Mikrofon erişimi reddedildi! Oyun oynanamaz.');
                console.error(err);
            }
        }

        function getSoundLevel() {
            if (!analyser) return 0;
            
            analyser.getByteFrequencyData(dataArray);
            
            // RMS (Root Mean Square) hesaplama - daha doğru ses seviyesi
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i] * dataArray[i];
            }
            const rms = Math.sqrt(sum / dataArray.length);
            
            // Normalize (0-100)
            return Math.min(100, (rms / 128) * 100);
        }

        // === OYUN DÖNGÜSÜ ===
        function gameLoop() {
            if (!State.isAlive || !State.isPlaying) return;

            // 1. Ses analizi (son 10 frame'in ortalaması)
            const instantLevel = getSoundLevel();
            State.soundHistory.push(instantLevel);
            if (State.soundHistory.length > 10) State.soundHistory.shift();
            
            const avgLevel = State.soundHistory.reduce((a, b) => a + b, 0) / State.soundHistory.length;
            State.lastSoundLevel = avgLevel;

            // 2. UI Güncelle
            updateUI(avgLevel);

            // 3. Yaratık AI
            updateMonster(avgLevel);

            // 4. Kalp atışı
            updateHeartRate();

            requestAnimationFrame(gameLoop);
        }

        function updateUI(level) {
            // Ses barı
            els.soundLevel.style.width = level + '%';
            
            // Ses etiketi
            let label = 'SESSIZ';
            let color = '#00ff00';
            if (level > 10) { label = 'FISILTI'; color = '#88ff00'; }
            if (level > 25) { label = 'NORMAL'; color = '#ffff00'; }
            if (level > 50) { label = 'BAGIRMA'; color = '#ff8800'; }
            if (level > 75) { label = 'CIGLIK!'; color = '#ff0000'; }
            
            els.soundLabel.textContent = label;
            els.soundLabel.style.color = color;

            // Kalp atışı gösterimi
            if (State.distance < 1000) {
                els.heartRate.classList.add('danger');
                State.heartRate = 60 + Math.floor((1000 - State.distance) / 5);
            } else {
                els.heartRate.classList.remove('danger');
                State.heartRate = 60;
            }
            els.bpm.textContent = State.heartRate;
        }

        function updateMonster(soundLevel) {
            // Ses seviyesine göre yaratık davranışı
            let moveSpeed = 0;
            let detectionRate = 0;

            if (soundLevel < 10) {
                // Sessizlik: Yaratık uzaklaşır/gezinir
                moveSpeed = -2;
                detectionRate = -0.5;
            } else if (soundLevel < 25) {
                // Fısıltı: Çok yavaş yaklaşır, meraklanır
                moveSpeed = 0.5;
                detectionRate = 0.2;
            } else if (soundLevel < 50) {
                // Normal: Yavaş yaklaşır
                moveSpeed = 3;
                detectionRate = 1;
            } else if (soundLevel < 75) {
                // Bağırma: Hızlı yaklaşır
                moveSpeed = 8;
                detectionRate = 3;
            } else {
                // Çığlık: Koşar
                moveSpeed = 20;
                detectionRate = 5;
            }

            // Farkındalık birikimi (threshold geçince hareket eder)
            State.awareness += detectionRate;
            State.awareness = Math.max(0, Math.min(100, State.awareness));

            // Farkındalık yeterliyse hareket et
            if (State.awareness > 20) {
                State.distance -= moveSpeed;
            } else {
                // Farkındalık yoksa rastgele gezin
                State.distance += (Math.random() - 0.5) * 2;
            }

            // Sınırlar
            State.distance = Math.max(100, Math.min(3000, State.distance));

            // Görsel güncelleme
            updateMonsterVisual();
            checkDeath();
        }

        function updateMonsterVisual() {
            const m = els.monster;
            
            // Mesafe durumları
            m.className = '';
            
            if (State.distance > 1500) {
                m.classList.add('far');
                els.shadowWarning.classList.remove('active');
            } else if (State.distance > 800) {
                m.classList.add('medium');
                els.shadowWarning.classList.remove('active');
            } else if (State.distance > 300) {
                m.classList.add('close');
                els.shadowWarning.classList.add('active');
            } else {
                m.classList.add('attacking');
                els.shadowWarning.classList.add('active');
            }

            // Gölge uyarısı opaklığı
            if (State.distance < 1000) {
                const intensity = 1 - (State.distance / 1000);
                els.shadowWarning.style.opacity = intensity;
            }
        }

        function checkDeath() {
            if (State.distance <= 100 && State.lastSoundLevel > 5) {
                triggerDeath();
            }
        }

        function triggerDeath() {
            State.isAlive = false;
            els.jumpscare.classList.add('active');
            
            // Kamera titreme efekti
            els.camera.style.animation = 'attackShake 0.5s';
        }

        function updateHeartRate() {
            // Görsel efekt için gerekli
        }

        // === KONTROLLER ===
        document.addEventListener('mousemove', (e) => {
            if (!State.isPlaying) return;
            
            State.mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            State.mouseY = (e.clientY / window.innerHeight - 0.5) * 2;

            // Kamera rotasyonu (sınırlı)
            State.cameraRotY = State.mouseX * 30; // Yaw
            State.cameraRotX = -State.mouseY * 20; // Pitch

            els.camera.style.transform = `rotateX(${State.cameraRotX}deg) rotateY(${State.cameraRotY}deg)`;
            
            // El feneri pozisyonu
            els.flashlight.style.left = e.clientX + 'px';
            els.flashlight.style.top = e.clientY + 'px';
        });

        // Başlat
        document.getElementById('start-btn').addEventListener('click', async () => {
            await initAudio();
            
            els.startScreen.style.opacity = '0';
            setTimeout(() => {
                els.startScreen.style.display = 'none';
                els.viewport.style.display = 'block';
                State.isPlaying = true;
                gameLoop();
            }, 1000);
        });

        // Klavye hareket (WASD)
        document.addEventListener('keydown', (e) => {
            if (!State.isPlaying) return;
            
            // İleri-geri hareket simülasyonu (Z ekseni)
            switch(e.key.toLowerCase()) {
                case 'w':
                    State.distance -= 50; // İleri git = yaratığa yaklaş
                    break;
                case 's':
                    State.distance += 50; // Geri git = uzaklaş
                    break;
            }
            State.distance = Math.max(100, Math.min(3000, State.distance));
        });
    </script>
</body>
</html>
